name: Run Telegram Bot 24/7

on:
  schedule:
    - cron: '0 */5 * * *' # يشتغل كل 5 ساعات
  workflow_dispatch: # زر تشغيل يدوي

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 300 
    
    steps:
    - name: Checkout code
      uses: checkout@v3

    - name: Set up Python
      uses: setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Bot
      run: python main.py

